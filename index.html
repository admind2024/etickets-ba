    <!-- FEATURED IMAGE PRELOAD -->
    <script>
      fetch('https://e-tickets-cache.rade-milosevic87.workers.dev/functions/v1/get-events-i18n?lang=bs')
        .then(r => r.json())
        .then(events => {
          const featured = events.find(e => e.prioritet);
          if (featured && featured.image) {
            const imgUrl = featured.image.startsWith('http')
              ? featured.image.replace('hvpytasddzeprgqkwlbu.supabase.co','e-tickets-cache.rade-milosevic87.workers.dev')
              : 'https://e-tickets-cache.rade-milosevic87.workers.dev/storage/v1/object/public/slike/' + featured.image;
            const link = document.createElement('link');
            link.rel = 'preload';
            link.as = 'image';
            link.href = imgUrl;
            link.fetchPriority = 'high';
            document.head.appendChild(link);
          }
        })
        .catch(() => {});
    </script>
